<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SanMar Colors - Inventory Lookup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='home-page.css') }}">
    <style>
        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1.25rem;
            margin-top: 1.5rem;
        }
        
        .color-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--gray-800);
            transition: all 0.2s ease-in-out;
        }
        
        .color-item:hover {
            transform: translateY(-5px);
        }
        
        .color-swatch {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--gray-300);
            margin-bottom: 0.75rem;
        }
        
        .color-name {
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="py-3 mb-3 text-center">
            <h1>SanMar Inventory Lookup</h1>
        </header>
        
        <!-- Breadcrumb Navigation -->
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-3">
                <li class="breadcrumb-item"><a href="/">Home</a></li>
                <li class="breadcrumb-item active" aria-current="page">All Colors</li>
            </ol>
        </nav>
        
        <!-- Main Content -->
        <div class="card">
            <div class="card-body">
                <h2 class="content-heading">Available Colors</h2>
                <p>Click on a color to view all products in that color.</p>
                
                <div class="color-grid">
                    {% for color in colors %}
                    <a href="/search?color={{ color.name|urlencode }}" class="color-item">
                        <div class="color-swatch" style="background-color: {{ color.hex }};" title="{{ color.name }}"></div>
                        <div class="color-name">{{ color.name }}</div>
                    </a>
                    {% endfor %}
                </div>
            </div>
        </div>
        
        <!-- Back to Home Button -->
        <div class="text-center mt-4">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i> Back to Home
            </a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
